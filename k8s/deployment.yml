apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-ventas-db
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-ventas-db
  template:
    metadata:
      labels:
        app: mysql-ventas-db
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        args: ["--default-authentication-plugin=mysql_native_password"]
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "admin123"
        - name: MYSQL_DATABASE
          value: "ventas_db"
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-ventas-service
  namespace: default
spec:
  selector:
    app: mysql-ventas-db
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-ventas
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-ventas
  template:
    metadata:
      labels:
        app: backend-ventas
    spec:
      initContainers:
      - name: wait-for-mysql
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z -w 2 mysql-ventas-service 3306; do echo "Esperando a MySQL..."; sleep 2; done;']
      containers:
      - name: backend-ventas
        image: 921558516087.dkr.ecr.us-east-1.amazonaws.com/backend-ventas:latest
        ports:
        - containerPort: 8080
        env:
        - name: DB_ENDPOINT
          value: "mysql-ventas-service"
        - name: DB_PORT
          value: "3306"
        - name: DB_NAME
          value: "ventas_db"
        - name: DB_USERNAME
          value: "root"
        - name: DB_PASSWORD
          value: "admin123"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql-ventas-service:3306/ventas_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
        - name: SPRING_DATASOURCE_USERNAME
          value: "root"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "admin123"
        - name: SPRING_JPA_HIBERNATE_DDL_AUTO
          value: "update"
        - name: RESTART_VERSION
          value: "12"
